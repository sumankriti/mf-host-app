<style>
  :host {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    box-sizing: border-box;
  }

  .mfe-nav {
    display: flex;
    gap: 1rem;
    padding: 1rem 2rem;
    background: #1a1a1a;
  }

  .nav-btn {
    color: white;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    transition: background 0.2s;
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .nav-btn.active {
    background: oklch(51.01% 0.274 263.83);
  }

  .mfe-outlet {
    padding: 1rem;
    min-height: 400px;
  }
</style>

<nav class="mfe-nav">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-btn">Home</a>
  <a routerLink="/mfe1" routerLinkActive="active" class="nav-btn">MFE1</a>
  <a routerLink="/mfe2" routerLinkActive="active" class="nav-btn">MFE2</a>
  <a routerLink="/login" routerLinkActive="active" class="nav-btn">Login</a>
</nav>
<div class="mfe-outlet">
  <router-outlet />
</div>
